name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    name: Lint and smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Ruff lint
        run: uvx ruff check mc.py

      - name: CLI parses and renders help
        run: |
          set -euo pipefail
          uv run mc.py --help
          for cmd in messages summarise post plans; do
            uv run mc.py "$cmd" --help >/dev/null
          done

      - name: PSScriptAnalyzer (mc.ps1)
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -MinimumVersion 1.21.0 -Force -Scope CurrentUser
          $results = Invoke-ScriptAnalyzer -Path ./mc.ps1 -Settings ./PSScriptAnalyzerSettings.psd1
          if ($results) { $results | Format-Table -AutoSize | Out-String | Write-Host }
          $errors = @($results | Where-Object { $_.Severity -eq 'Error' })
          if ($errors.Count -gt 0) { throw "PSScriptAnalyzer found $($errors.Count) error(s)." }
          Write-Host 'PSScriptAnalyzer: clean.'

      - name: PowerShell twin parses and renders help
        shell: pwsh
        run: |
          ./mc.ps1 help | Out-Null
          Write-Host "mc.ps1: OK"
