name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    name: Lint and smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Ruff lint
        run: uvx ruff check mc.py

      - name: CLI parses and renders help
        run: |
          set -euo pipefail
          uv run mc.py --help
          for cmd in messages summarise post plans; do
            uv run mc.py "$cmd" --help >/dev/null
          done
